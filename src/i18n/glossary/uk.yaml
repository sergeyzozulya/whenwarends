style:
  - Уживайте «війна» або «російсько-українська війна»; не «конфлікт» як евфемізм.
  - «ринкова ймовірність», ніколи «прогноз сайту».
  - Перше слово речення з великої літери. Без емодзі. Без знаків оклику.
