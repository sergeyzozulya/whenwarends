# Locked Ukrainian terminology for the editorial brief (українська).
# Reviewed separately from brief approval (SPEC §9). The draft model must use
# these exact forms for the listed concepts.

countries:
  ukraine: Україна
  russia: Росія

agencies:
  isw: Інститут вивчення війни (ISW)
  nbu: Національний банк України
  cbr: Центральний банк Росії
  gdelt: проєкт GDELT
  firms: NASA FIRMS
  kiel: Кільський трекер підтримки України

