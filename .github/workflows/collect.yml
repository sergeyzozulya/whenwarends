name: Daily data collection and brief

# Pulls every source daily; when the collection actually changed something,
# refreshes the related-news selection and AUTO-PUBLISHES the editorial brief
# against the fresh numbers, then commits data/ + public/news/ in one push. The
# push to main triggers CI, which rebuilds the static site (embedding the new
# numbers, news and brief) and deploys it. Manual runs allowed via the Actions
# tab.
#
# Two-stage so the Anthropic spend only happens when the data moved: the data
# collectors run keyless (SKIP_DOWNSTREAM), then — only if data/ changed — the
# news + brief steps run with the API key. There is no human review gate (owner
# decision, 2026-05-18 — see data/changelog.json and CLAUDE.md). draft-brief.ts
# keeps the integrity safeguards (citation allow-list, refusal/truncation
# guards, per-language isolation); the git commit is the audit trail.
on:
  schedule:
    - cron: '0 8 * * *' # 08:00 UTC daily (SPEC §10 daily cadence)
  workflow_dispatch:

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    name: Collect data, refresh news + brief, commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Data only (keyless). SKIP_DOWNSTREAM skips the news + brief steps inside
      # collect.ts; those run separately below, with the key, only if data moved.
      - name: Collect data
        run: SKIP_DOWNSTREAM=1 npm run collect
        env:
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          KIEL_DATASET_URL: ${{ secrets.KIEL_DATASET_URL }}
          # Manifold needs no key; MANIFOLD_MARKET_ID is optional operator
          # config (defaults baked into the collector).
          MANIFOLD_MARKET_ID: ${{ secrets.MANIFOLD_MARKET_ID }}
      # Only spend on generation when the numbers actually moved — an unchanged
      # dataset would produce an equivalent news selection and brief. A news
      # hiccup must not block the brief, so it is allowed to fail soft (the
      # prior news.json stays); a total brief failure surfaces the step.
      - name: Refresh news and brief (only if data changed)
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            echo "Data changed — refreshing related news and the brief."
            npm run collect-news || echo "::warning::news refresh failed — keeping prior news.json"
            npm run draft-brief
          else
            echo "No data changes this run — skipping news + brief."
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # always(): commit whatever was collected even if the brief step failed,
      # so a transient API problem never loses a day's data. The status check
      # below no-ops when nothing changed.
      - name: Commit data + news changes
        id: commit
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/ public/news/)" ]; then
            git add data/ public/news/
            git commit -m "chore(data): daily collection + brief $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No data changes this run."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      # The commit above is pushed with the default GITHUB_TOKEN, which — by
      # design, to prevent recursive runs — does NOT trigger the on:push
      # CI/deploy in ci.yml. So a bot data commit would land in git but never
      # reach Cloudflare. We therefore build + deploy the fresh site right here.
      # Only when something actually changed: an unchanged dataset has nothing
      # new to ship. The build embeds the just-committed data/news/brief.
      # always() so a soft/hard failure in the news or brief step above can't
      # skip the deploy of data that was nonetheless committed (mirrors the
      # always() on the commit step). Build is gated on a commit having
      # happened; deploy is gated on the build succeeding (broken data must
      # not ship).
      - name: Build site with fresh data
        id: build
        if: always() && steps.commit.outputs.changed == 'true'
        run: npm run build
      - name: Deploy to Cloudflare
        if: always() && steps.build.outcome == 'success'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
