name: Weekly brief draft (RETIRED)

# RETIRED 2026-05-18 (owner decision — see data/changelog.json and CLAUDE.md).
#
# This workflow drafted the brief and opened a PR for human review/merge.
# That review gate was removed: brief generation now runs inside collect.yml
# right after data collection and AUTO-PUBLISHES (no PR). Keeping a second
# pipeline here would double-spend the API and open PRs of already-published
# rows. Left as an inert, manual-only no-op (not deleted) so the retirement
# is visible in history rather than silently vanishing.
#
# Do not re-enable. To change brief behaviour, edit scripts/draft-brief.ts /
# scripts/backfill-briefs.ts and collect.yml.
on:
  workflow_dispatch:

jobs:
  retired:
    name: Retired — see collect.yml
    runs-on: ubuntu-latest
    steps:
      - name: Explain
        run: |
          echo "brief.yml is retired. Brief generation + auto-publish now"
          echo "runs in collect.yml after data collection. Historical"
          echo "backfill: npm run backfill-briefs (manual). No-op; exiting."
