name = "whenwarends"
main = "worker/index.ts"
compatibility_date = "2025-01-01"
# No node_compat / nodejs_compat: the Worker only serves static assets +
# /api/health and uses no Node.js APIs. (node_compat was removed in Wrangler v4.)

# No D1/KV/Cron: data lives in versioned repo JSON files baked into the static
# build. Weekly collection runs in GitHub Actions (.github/workflows/collect.yml),
# not a Cron Trigger. The Worker only serves static assets + a health probe.

# Build-time collector secrets (FIRMS_MAP_KEY) and the Phase-3 brief key
# (ANTHROPIC_API_KEY) are GitHub Actions secrets, not Worker secrets.
[vars]
CONTACT_TO_EMAIL = "hello@whenwarends.org"
CONTACT_FROM_EMAIL = "noreply@whenwarends.org"
CONTACT_FROM_NAME = "When War Ends"

# Static Assets binding
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"

# Environment-specific configuration
[env.production]
routes = [
  { pattern = "whenwarends.org", zone_name = "whenwarends.org" },
  { pattern = "www.whenwarends.org", zone_name = "whenwarends.org" }
]
